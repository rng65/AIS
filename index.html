<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIS Portfolio | Part 1</title>
    <style>
        /* Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Decorative Background Elements */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 212, 255, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        /* Main Card */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 420px;
            width: 90%;
        }

        /* Profile Image Styling */
        .image-ring {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #00d4ff, #0055ff);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1e293b;
            background: #334155;
        }

        /* Text Styling */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .role {
            color: #38bdf8;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: block;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Status Button */
        .btn {
            background: #f8fafc;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #00d4ff;
            color: white;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="glass-card">
        <div class="image-ring">
            <img src="assets/profile.jpg" alt="User Profile" class="profile-pic" 
                 onerror="this.src='https://ui-avatars.com/api/?name=User&background=0f172a&color=38bdf8&size=200'">
        </div>
        
        <span class="role">System Developer</span>
        <h1>Project AIS</h1>
        <p>Information systems student specializing in the intersection of finance and technology.</p>
        
        <a href="#" class="btn">Part 1 Online</a>
    </div>

</body>
</html>
