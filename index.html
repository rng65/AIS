<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        img { width: 150px; border-radius: 50%; border: 3px solid #333; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World!</h1>
        <img src="assets/profile.jpg" alt="Profile Picture">
        <p>This page was created using Gemini and GitHub.</p>
    </div>
</body>
</html>
